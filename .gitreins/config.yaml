guards:
  test_mode: diff
  test_command: go test -short -count=1 ./pkg/...
  secrets: true
  lint: true
  tests: true
  build: true
  dead_code: false
  lsp: true
  lsp_tools:
  - gopls
  static_analysis: false
  go:
    lint: true
    tests: true
    build: true
    lint_command: golangci-lint
evaluator:
  max_iterations: 100
  max_time: 10m
  max_input_tokens: 0.2M
  max_output_tokens: 0.05M
  tool_call_weight: 0.1
  code_context_budget: 0.70
  compaction_threshold: 0.90
defaults:
  model: openrouter/owl-alpha
pipeline:
  stages:
  - id: tier1
    parallel: true
    true:
    - pre-commit
    - pre-eval
    steps:
    - id: secrets
      type: script
      run: python3 -c "from engine.guard_manager import GuardManager; gm = GuardManager('.');
        r = gm._check_secrets(); import sys; sys.exit(0 if r.passed else 1)"
      on_fail: continue
    - id: lsp
      type: script
      run: git diff --cached --name-only --diff-filter=ACM | grep '\.go$' | xargs
        -r gopls check 2>&1 || true
      on_fail: continue
    - id: lint
      type: script
      run: python3 -c "from engine.guard_manager import GuardManager; gm = GuardManager('.');
        r = gm._check_lint(); import sys; sys.exit(0 if r.passed else 1)"
      on_fail: continue
    - id: tests
      type: script
      run: python3 -c "from engine.guard_manager import GuardManager; gm = GuardManager('.');
        r = gm._check_tests(); import sys; sys.exit(0 if r.passed else 1)"
      on_fail: continue
    - id: build
      type: script
      run: python3 -c "from engine.guard_manager import GuardManager; gm = GuardManager('.'); from engine.guards import check_go_build; r = check_go_build('.'); import sys; sys.exit(0 if r.passed else 1)"
      on_fail: continue
    - id: trust_tier
      type: script
      run: bash scripts/check-trust-tier.sh --agent-id "${GIT_COMMITTER_NAME:-unknown}" --tier "${HELIX_AGENT_TIER:-provisional}" --files $(git diff --cached --name-only --diff-filter=ACM | tr '\n' ' ') || true
      on_fail: continue

  - id: tier2
    type: ai_eval
    true:
    - pre-eval
    condition: 'true'
    max_iterations: 100
    tools:
    - read_file
    - run_command
    - search_pattern
    - read_diff
    - sandbox
history:
  enabled: true
  storage: git
  max_verdicts: 1000
