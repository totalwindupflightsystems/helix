# GitReins Configuration — Helix monorepo
# v0.6.0: test_mode diff, evaluator caps

# ── Guards (Tier 1 static checks) ───────────────────────────
guards:
  test_mode: "diff"
  secrets: true         # OpenRouter + GitHub + private key patterns
  lint: true            # go vet / golangci-lint (auto-detects Go project)
  tests: true           # go test ./... -count=1
  build: true           # go build ./...
  go:
    lint: true
    tests: true
    build: true
    lint_command: "golangci-lint"

# ── Evaluator Caps (Go project) ────────────────────────────
evaluator:
  max_iterations: 25
  max_time: "5m"
  max_input_tokens: "0.2M"
  max_output_tokens: "200k"
  tool_call_weight: 0.1

# ── Pipeline ────────────────────────────────────────────────
pipeline:
  stages:
    - id: tier1
      parallel: true
      on: [pre-commit, pre-eval]
      steps:
        - id: secrets
          type: script
          run: "gitleaks detect --source . --no-git 2>/dev/null || python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_secrets(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: lint
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_lint(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: tests
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_tests(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: build
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); from engine.guards import check_go_build; r = check_go_build('.'); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

    - id: tier2
      type: ai_eval
      on: [pre-eval]
      condition: "true"
      max_iterations: 25
      tools: [read_file, run_command, search_pattern, read_diff, sandbox]
