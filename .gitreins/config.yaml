# GitReins Configuration — Helix monorepo
# v0.3.0 format: separate caps, tool weighting, decimal notation

# ── Guards (Tier 1 static checks) ───────────────────────────
guards:
  secrets: true         # OpenRouter + GitHub + private key patterns
  lint: true            # go vet / golangci-lint (auto-detects Go project)
  tests: true           # go test ./... -count=1
  build: true           # go build ./...
  go:
    lint: true
    tests: true
    build: true
    lint_command: "golangci-lint"

# ── Evaluator Caps (v0.3.0 — all separate, all optional) ────
evaluator:
  max_iterations: 50          # LLM turns (-1 = unlimited)
  max_time: "10m"             # wall clock limit per evaluation
  max_input_tokens: "0.2M"    # input budget (200k tokens)
  max_output_tokens: "0.05M"  # output budget (50k tokens)
  tool_call_weight: 0.1       # tool calls cost 0.1 iterations each

# ── Tier 2 Per-Task Overrides ───────────────────────────────
# For simple PRs, use tighter caps via MCP:
#   mcp_gitreins_judge_evaluate(id="task", max_iterations=25, max_time="5m", max_output_tokens="30k")
#
# For security audits, use wider caps:
#   mcp_gitreins_judge_evaluate(id="task", max_iterations=100, max_time="30m", max_output_tokens="200k")

# ── Pipeline ────────────────────────────────────────────────
pipeline:
  stages:
    - id: tier1
      parallel: true
      on: [pre-commit, pre-eval]
      steps:
        - id: secrets
          type: script
          run: "gitleaks detect --source . --no-git 2>/dev/null || python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_secrets(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: lint
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_lint(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: tests
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); r = gm._check_tests(); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

        - id: build
          type: script
          run: "python3 -c \"from engine.guard_manager import GuardManager; gm = GuardManager('.'); from engine.guards import check_go_build; r = check_go_build('.'); import sys; sys.exit(0 if r.passed else 1)\""
          on_fail: continue

    - id: tier2
      type: ai_eval
      on: [pre-eval]
      condition: "true"
      max_iterations: 50
      tools: [read_file, run_command, search_pattern, read_diff, sandbox]
