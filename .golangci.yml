version: "2"
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/totalwindupflightsystems/helix
run:
  timeout: 5m
  go: "1.22"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - -QF1012  # WriteString(fmt.Sprintf(...)) — pre-existing
        - -QF1001  # De Morgan's law — pre-existing
        - -QF1003  # Tagged switch — pre-existing
        - -QF1008  # Embedded field selector — pre-existing
        - -QF1002  # Tagged switch on arg — pre-existing
        - -ST1003  # Naming conventions — pre-existing
        - -ST1005  # Error strings punctuation — pre-existing
        - -ST1016  # Methods on value vs pointer — pre-existing
        - -ST1020  # Exported function doc comment — pre-existing
        - -ST1021  # Exported type doc comment — pre-existing
        - -ST1022  # Exported method doc comment — pre-existing
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - (io.Writer).Write
        - (net/http.Flusher).Flush
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]
        text: "Error return value"
      - path: cmd/
        linters: [errcheck]
        text: "Error return value"
      - linters: [errcheck]
        text: 'Close|Flush|\.Write\b'
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
