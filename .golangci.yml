run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/totalwindupflightsystems/helix

issues:
  exclude-rules:
    # Exclude errcheck for fmt.Fprint* calls (output operations, errors irrelevant)
    - linters:
        - errcheck
      text: "Error return value of `(fmt\\.Fprint|fmt\\.Fprintf|fmt\\.Fprintln)`"
    # Exclude errcheck on defer .Close() calls (cleanup only)
    - linters:
        - errcheck
      text: "Error return value of `.*Close`"
    # Exclude errcheck on w.Flush (tabwriter cleanup)
    - linters:
        - errcheck
      text: "Error return value of `w\\.Flush`"
    # Exclude some linters from running on test files
    - path: _test\\.go
      linters:
        - errcheck
        - unused
    # Exclude known linter issues in generated code
    - path: ".*\\.pb\\.go"
      linters:
        - all
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
