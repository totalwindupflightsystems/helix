# .forgejo/workflows/prompt-eval.yml — PromptFoo Regression Tests
# Generated by pkg/prompt/ci. Do not edit by hand — regenerate via:
#   go run ./pkg/prompt/ci generate
# Based on specs/SPECIFICATION.md §7.7

name: PromptFoo Regression Tests
on:
    push:
        paths:
            - prompts/**
            - .promptfoo.yaml
            - .promptfoo/**
jobs:
    promptfoo:
        runs-on: ubuntu-latest
        container: node:20-bookworm
        env:
            PROMPTFOO_CONFIG_DIR: ${{ github.workspace }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: "20"
            - name: Install PromptFoo
              run: npm install -g promptfoo
            - name: Run PromptFoo evaluation
              run: npx promptfoo eval
              env:
                DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: promptfoo-results
                path: promptfoo-results.json
                retention-days: 30
              if: always()
