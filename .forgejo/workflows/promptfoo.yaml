# .forgejo/workflows/promptfoo.yaml — Prompt Regression Tests
# Based on specs/deployment.md §5.1
#
# Runs PromptFoo evaluation when prompt files change.
# Catches prompt regressions before they reach production.
name: Prompt Regression Tests
on:
  push:
    paths:
      - 'prompts/**'
      - '.promptfoo.yaml'
      - '.promptfoo/**'

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - uses: actions/checkout@v4

      - name: Install PromptFoo
        run: npm install -g promptfoo

      - name: Run PromptFoo evaluation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx promptfoo eval

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: promptfoo-results.json
          retention-days: 30
